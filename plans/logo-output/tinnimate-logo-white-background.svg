<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <filter id="glowPurple2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="iconGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="textGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6D28D9"/>
      <stop offset="60%" style="stop-color:#DB2777"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="taglineGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0.7"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="480" height="160" fill="#FFFFFF" rx="16"/>

  <!-- Icon container -->
  <rect x="12" y="12" width="112" height="112" rx="28" fill="#F5F3FF"/>
  <rect x="12" y="12" width="112" height="112" rx="28" fill="none" stroke="url(#iconGradient2)" stroke-width="1.5" opacity="0.5"/>

  <!-- T lettermark -->
  <g filter="url(#glowPurple2)">
    <rect x="34" y="38" width="68" height="12" rx="6" fill="url(#iconGradient2)"/>
    <rect x="56" y="50" width="24" height="50" rx="6" fill="url(#iconGradient2)"/>
  </g>

  <!-- Sound waves left -->
  <path d="M 36 68 Q 28 80 36 92" stroke="#EC4899" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M 30 60 Q 18 80 30 100" stroke="#EC4899" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Sound waves right -->
  <path d="M 100 68 Q 108 80 100 92" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M 106 60 Q 118 80 106 100" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Amber dot -->
  <circle cx="92" cy="110" r="5" fill="#F59E0B" opacity="0.9"/>

  <!-- Wordmark -->
  <text
    x="148" y="82"
    font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
    font-size="44" font-weight="800" letter-spacing="2"
    fill="url(#textGradient2)"
    filter="url(#softGlow2)"
  >TINNIMATE</text>

  <!-- Tagline -->
  <text
    x="149" y="108"
    font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
    font-size="13" font-weight="400" letter-spacing="4"
    fill="url(#taglineGradient2)"
  >CONNECT · ENTERTAIN · ANIMATE</text>

  <!-- Accent line -->
  <line x1="148" y1="116" x2="336" y2="116" stroke="url(#iconGradient2)" stroke-width="1" opacity="0.3"/>
</svg>
