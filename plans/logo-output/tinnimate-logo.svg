<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Neon glow filters -->
    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#EC4899;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C084FC;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#F472B6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FBD38D;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="taglineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#F9A8D4;stop-opacity:0.8"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="15%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0D0D1A;stop-opacity:0"/>
    </radialGradient>

    <!-- Clip path for icon container -->
    <clipPath id="iconClip">
      <rect x="12" y="12" width="112" height="112" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" fill="#0D0D1A" rx="16"/>
  <rect width="480" height="160" fill="url(#bgGlow)" rx="16"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="80" x2="480" y2="80" stroke="#7C3AED" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Icon container background -->
  <rect x="12" y="12" width="112" height="112" rx="28" fill="#13101F"/>
  <rect x="12" y="12" width="112" height="112" rx="28" fill="none" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>

  <!-- Icon: Abstract "T" with sound waves + connection nodes -->
  <!-- Central T lettermark with neon glow -->
  <g filter="url(#glowPurple)" clip-path="url(#iconClip)">
    <!-- Horizontal bar of T -->
    <rect x="34" y="38" width="68" height="12" rx="6" fill="url(#iconGradient)"/>
    <!-- Vertical bar of T -->
    <rect x="56" y="50" width="24" height="50" rx="6" fill="url(#iconGradient)"/>
  </g>

  <!-- Sound wave arcs on the left of the T -->
  <g filter="url(#glowPink)">
    <path d="M 36 68 Q 28 80 36 92" stroke="#EC4899" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M 30 60 Q 18 80 30 100" stroke="#EC4899" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Sound wave arcs on the right of the T -->
  <g filter="url(#glowPink)">
    <path d="M 100 68 Q 108 80 100 92" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M 106 60 Q 118 80 106 100" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Accent dot (amber) -->
  <circle cx="92" cy="110" r="5" fill="#F59E0B" filter="url(#glowAmber)" opacity="0.95"/>

  <!-- Wordmark: TINNIMATE -->
  <text
    x="148"
    y="82"
    font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
    font-size="44"
    font-weight="800"
    letter-spacing="2"
    fill="url(#textGradient)"
    filter="url(#softGlow)"
  >TINNIMATE</text>

  <!-- Tagline -->
  <text
    x="149"
    y="108"
    font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="4"
    fill="url(#taglineGradient)"
    opacity="0.85"
  >CONNECT · ENTERTAIN · ANIMATE</text>

  <!-- Decorative accent line under wordmark -->
  <line x1="148" y1="116" x2="336" y2="116" stroke="url(#iconGradient)" stroke-width="1" opacity="0.35"/>

  <!-- Star/sparkle accents -->
  <g filter="url(#glowAmber)">
    <circle cx="454" cy="28" r="2.5" fill="#F59E0B" opacity="0.8"/>
    <circle cx="465" cy="42" r="1.5" fill="#EC4899" opacity="0.6"/>
    <circle cx="444" cy="38" r="1.8" fill="#C084FC" opacity="0.7"/>
  </g>
</svg>
