<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:420px;height:746px;overflow:hidden;background:#020617;font-family:'Segoe UI',sans-serif;color:#fff}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;opacity:0;transform:translateY(30px)}
.scene.s1{opacity:0;transform:translateY(30px)}
.scene.s2{opacity:0;transform:translateY(30px)}
.scene.s3{opacity:0;transform:translateY(30px)}

@keyframes slideUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #06b6d433}50%{box-shadow:0 0 50px #06b6d466}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:pulse 4s infinite}
.orb1{top:-15%;left:-10%;width:300px;height:300px;background:#06b6d415}
.orb2{bottom:10%;right:-20%;width:250px;height:250px;background:#3b82f612;animation-delay:2s}

.heading{font-size:28px;font-weight:800;background:linear-gradient(135deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;animation:slideUp .6s .8s both}
.sub{font-size:14px;color:#94a3b8;margin-bottom:16px;animation:slideUp .6s 1.2s both}
.detail{font-size:13px;color:#cbd5e1;white-space:pre-line;line-height:1.8;animation:slideUp .6s 1.6s both}
.emoji-big{font-size:64px;margin-bottom:16px;animation:slideUp .5s .5s both,float 3s 1.5s infinite}

.s2 .heading{animation:slideUp .6s 10.5s both}
.s2 .sub{animation:slideUp .6s 10.6s both}
.items{display:flex;flex-direction:column;gap:8px;max-width:320px;width:100%}
.item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);padding:12px 16px;border-radius:12px;font-size:13px;color:#e2e8f0;text-align:left}

.s3 .heading{animation:slideUp .5s 20.5s both;font-size:20px}
.s3 .sub{animation:slideUp .5s 20.8s both}
.cta-btn{margin-top:20px;background:linear-gradient(135deg,#06b6d4,#3b82f6);border:none;color:#fff;padding:14px 32px;border-radius:50px;font-size:14px;font-weight:700;animation:slideUp .5s 21.2s both,glow 2s 22s infinite}

.watermark{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.15)}
</style></head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>

<!-- Scene 1 -->
<div class="scene s1">
  <div class="emoji-big">🌊</div>
  <div class="heading">Sóng Biển</div>
  <div class="sub">Nhịp thở tự nhiên 6-8 lần/phút</div>
  <div class="detail">Sóng vỗ bờ đồng bộ
với nhịp thở lý tưởng</div>
</div>

<!-- Scene 2 -->
<div class="scene s2">
  <div class="heading">🏖️ Lợi ích</div>
  <div class="sub">Hơn cả âm thanh đẹp</div>
  <div class="items">
    <div class="item" style="animation:slideUp .5s 10.7s both">Điều hòa nhịp tim</div>
      <div class="item" style="animation:slideUp .5s 11s both">Giảm huyết áp tự nhiên</div>
      <div class="item" style="animation:slideUp .5s 11.299999999999999s both">Cải thiện giấc ngủ 30%</div>
  </div>
</div>

<!-- Scene 3 - CTA -->
<div class="scene s3">
  <div class="heading">🌐 TinniMate</div>
  <div class="sub">Đại dương trong tai nghe</div>
  <div class="cta-btn">🌊 Nghe sóng biển →</div>
</div>

<div class="watermark">@tinnimate • tinnitus.vuinghe.com/therapy</div>

<script>
(function() {
  const scenes = document.querySelectorAll('.scene');
  const timings = [1000, 10500, 20500];
  scenes.forEach(s => { s.style.opacity = '0'; s.style.transition = 'none'; });
  scenes.forEach((scene, i) => {
    setTimeout(() => {
      scene.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      scene.style.opacity = '1';
      scene.style.transform = 'translateY(0)';
    }, timings[i]);
    if (i < scenes.length - 1) {
      setTimeout(() => {
        scene.style.transition = 'opacity 0.4s ease';
        scene.style.opacity = '0';
      }, timings[i + 1] - 400);
    }
  });
})();
</script>
</body></html>
